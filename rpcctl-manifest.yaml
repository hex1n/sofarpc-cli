defaultEnv: test-zk
sofaRpcVersion: 5.4.0
protocol: bolt
serialization: hessian2
timeoutMs: 3000
envs:
  local-direct:
    mode: direct
    directUrl: bolt://127.0.0.1:12200
  test-zk:
    mode: registry
    registryProtocol: zookeeper
    registryAddress: 127.0.0.1:2181
  sofa-registry:
    mode: registry
    registryAddress: sofa://127.0.0.1:9603
services:
  com.example.UserService:
    description: Example manifest only. Replace with your real services.
    uniqueId: user-service
    methods:
      getUser:
        description: Read one user by id.
        risk: read
        paramTypes:
          - java.lang.Long
      queryUsers:
        description: Query users with a keyword and a page size.
        risk: read
        paramTypes:
          - java.lang.String
          - java.lang.Integer
      updateUser:
        description: Update a user profile.
        risk: write
        paramTypes:
          - com.example.UserUpdateRequest
