name: e2e

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  direct-bolt-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run e2e smoke tests
        run: go test -tags=e2e ./tests/e2e/...
