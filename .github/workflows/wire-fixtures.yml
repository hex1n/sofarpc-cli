name: wire-fixtures

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Regenerate baseline fixtures
        run: bash scripts/verify-wire-fixtures.sh

  compatibility-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        sofarpc-version:
          - 5.4.0
          - 5.7.6
          - 5.8.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Generate and verify fixtures
        run: bash scripts/verify-wire-fixtures.sh --sofarpc-version ${{ matrix.sofarpc-version }}
